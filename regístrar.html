<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>📝 Registro</h1>
        <form onsubmit="alert('¡Cuenta creada! (Simulación)'); window.location.href='login.html'; return false;">
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Crea una contraseña" required>
            <button type="submit" class="btn">Crear mi cuenta</button>
        </form>
        <p><a href="login.html">Ya tengo cuenta</a></p>
    </div>
</body>
</html>
