<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Web</title>
    <!-- Iconos para los botones -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Estilos Globales Compartidos */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #24292f;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.1);
            width: 90%;
            max-width: 340px; 
        }

        h1 { 
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: -10px;
        }

        input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background-color: #f6f8fa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #0969da;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
        }

        .btn-submit {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            padding: 10px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #2c974b;
        }

        /* --- NUEVOS ESTILOS: REGISTRO SOCIAL --- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #57606a;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #d0d7de;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 8px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            text-decoration: none;
            color: #24292f;
            border: 1px solid #d0d7de;
            background-color: #ffffff;
            transition: background-color 0.2s;
        }

        .btn-social:hover {
            background-color: #f3f4f6;
        }

        /* Colores sutiles para los iconos */
        .fa-google { color: #DB4437; }
        .fa-github { color: #24292f; }
        .fa-discord { color: #5865F2; }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #57606a;
        }

        .footer-link a {
            color: #0969da;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Crear cuenta</h1>
        
        <form onsubmit="alert('¡Cuenta creada! (Simulación)'); window.location.href='login.html'; return false;">
            <label>Nombre completo</label>
            <input type="text" placeholder="Ej: Octocat" required>
            
            <label>Correo electrónico</label>
            <input type="email" placeholder="nombre@ejemplo.com" required>
            
            <label>Contraseña</label>
            <input type="password" placeholder="Mínimo 8 caracteres" required>
            
            <button type="submit" class="btn-submit">Crear mi cuenta</button>
        </form>

        <!-- SECCIÓN DE REGISTRO SOCIAL -->
        <div class="divider">O regístrate con</div>

        <div class="social-group">
            <a href="#" class="btn-social" onclick="alert('Conectando con Google...')">
                <i class="fab fa-google"></i> Google
            </a>
            <a href="#" class="btn-social" onclick="alert('Conectando con GitHub...')">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="#" class="btn-social" onclick="alert('Conectando con Discord...')">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
        
        <p class="footer-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>
    </div>
</body>
</html>
