<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi Web</title>
    <!-- Iconos corregidos -->
    <link rel="stylesheet" href="https://cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- SDK de Auth0 corregido -->
    <script src="https://auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    
    <style>
        /* Base y Tipografía */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #24292f;
        }

        h1 { font-size: 24px; font-weight: 300; letter-spacing: -0.5px; margin-bottom: 20px; }

        .card {
            background-color: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.1);
            box-sizing: border-box;
        }

        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 14px; font-weight: 600; margin-bottom: -10px; }
        input { padding: 5px 12px; font-size: 14px; line-height: 20px; color: #24292f; background-color: #ffffff; border: 1px solid #d0d7de; border-radius: 6px; outline: none; }
        input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }

        .btn-primary {
            background-color: #2da44e; color: white; border: 1px solid rgba(27, 31, 36, 0.15);
            padding: 6px 16px; font-weight: 600; font-size: 14px; border-radius: 6px; cursor: pointer;
            border: none; transition: 0.2s;
        }
        .btn-primary:hover { background-color: #2c974b; }

        .divider { display: flex; align-items: center; text-align: center; margin: 15px 0; color: #57606a; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #d0d7de; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-social {
            display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px;
            font-size: 13px; font-weight: 500; border-radius: 6px; text-decoration: none; color: #24292f;
            border: 1px solid #d0d7de; background-color: #ffffff; cursor: pointer; transition: 0.2s;
        }
        .btn-social:hover { background-color: #f3f4f6; }
        .fa-google { color: #DB4437; }
        .fa-github { color: #24292f; }

        .footer-card {
            margin-top: 15px; padding: 15px; text-align: center; border: 1px solid #d0d7de;
            border-radius: 6px; width: 300px; font-size: 14px; box-sizing: border-box;
        }
        .footer-card a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>

    <h1>🔐 Ingresar</h1>

    <div class="card">
        <!-- FORMULARIO CORREGIDO: Ahora llama a login() de Auth0 -->
        <form onsubmit="login(); return false;">
            <label>Correo electrónico</label>
            <input type="email" placeholder="nombre@ejemplo.com" required>
            <label>Contraseña</label>
            <input type="password" required>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="divider">O continúa con</div>

        <div class="social-group">
            <button class="btn-social" onclick="login('google-oauth2')">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="btn-social" onclick="login('github')">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>
    </div>

    <div class="footer-card">
        ¿No tienes cuenta? <a href="registrate.html">Regístrate ahora</a>.
    </div>

    <script>
        let auth0 = null;

        async function initAuth0() {
            auth0 = await createAuth0Client({
                domain: "dev-2i7nz3hw5y4ob0yb.us.auth0.com",
                clientId: "dnP3foqFuc4OAaWe2LNst79GIUYH5qd5"
            });

            const query = window.location.search;
            if (query.includes("code=") && query.includes("state=")) {
                await auth0.handleRedirectCallback();
                window.location.href = 'https://github.io'; 
            }

            const isAuthenticated = await auth0.isAuthenticated();
            if (isAuthenticated) {
                // Aquí puedes poner la página a la que quieres que entren al loguearse
                window.location.href = 'https://cristian2024-ops.github.io/dashboard.html';
            }
        }

        // Función unificada para Login (Email o Social)
        async function login(provider) {
            const options = {
                authorizationParams: {
                    redirect_uri: "https://github.io"
                }
            };
            
            // Si hay un proveedor (Google/GitHub), lo añade
            if (provider) {
                options.authorizationParams.connection = provider;
            }

            await auth0.loginWithRedirect(options);
        }

        window.onload = initAuth0;
    </script>
</body>
</html>
