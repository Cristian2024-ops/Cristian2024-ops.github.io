<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi Web</title>
    <style>
        /* Base y Tipografía */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #24292f;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        /* Contenedor del Formulario */
        .card {
            background-color: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: -10px;
        }

        /* Inputs Estilizados */
        input {
            padding: 5px 12px;
            font-size: 14px;
            line-height: 20px;
            color: #24292f;
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
        }

        /* Botón de Entrada (Verde Success) */
        .btn-primary {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27, 31, 36, 0.15);
            padding: 6px 16px;
            font-weight: 600;
            font-size: 14px;
            line-height: 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #2c974b;
        }

        /* Caja inferior para Registro */
        .footer-card {
            margin-top: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            width: 300px;
            font-size: 14px;
        }

        .footer-card a {
            color: #0969da;
            text-decoration: none;
        }

        .footer-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>🔐 Ingresar</h1>

    <div class="card">
        <form onsubmit="window.location.href='dashboard.html'; return false;">
            <label>Correo electrónico</label>
            <input type="email" required>
            
            <label>Contraseña</label>
            <input type="password" required>
            
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </div>

    <div class="footer-card">
        ¿No tienes cuenta? <a href="registrate.html">Regístrate ahora</a>.
    </div>

</body>
    </html>
