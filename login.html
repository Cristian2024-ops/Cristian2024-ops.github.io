<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>🔐 Ingresar</h1>
        <form onsubmit="window.location.href='dashboard.html'; return false;">
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <p><a href="registrate.html">¿No tienes cuenta? Regístrate</a></p>
    </div>
</body>
</html>
