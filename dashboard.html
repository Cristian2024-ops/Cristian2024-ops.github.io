<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - GitHub Style</title>
  <style>
    /* Estilos Base */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #f6f8fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #24292f;
    }

    /* Contenedor Principal */
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 90%;
      max-width: 800px;
    }

    h1 { 
      font-size: 24px;
      margin-bottom: 8px;
      color: #1f2328;
    }

    p { 
      color: #636e72;
      margin-bottom: 24px;
    }

    /* Estilos de la Tabla */
    .table-container {
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .user-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    .user-table th {
      background-color: #f6f8fa;
      padding: 12px;
      border: 1px solid #d0d7de;
      color: #57606a;
      font-weight: 600;
    }

    .user-table td {
      padding: 12px;
      border: 1px solid #d0d7de;
      vertical-align: middle;
    }

    .user-table tr:hover {
      background-color: #fcfcfc;
    }

    /* Etiquetas de Estado */
    .status-badge {
      padding: 3px 10px;
      border-radius: 2em;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .status-active { 
      background: #dafbe1; 
      color: #1a7f37;
      border-color: rgba(26, 127, 55, 0.2);
    }

    .status-pending { 
      background: #fff8c5; 
      color: #9a6700;
      border-color: rgba(154, 103, 0, 0.2);
    }

    /* Botones */
    .btn {
      display: inline-block;
      padding: 6px 16px;
      background-color: #0984e3;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn:hover { 
      background-color: #0873c4; 
    }

    .username {
      color: #0969da;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💻 Panel de Control</h1>
    <p>Monitoreo de actividad y gestión de usuarios.</p>

    <div class="table-container">
      <table class="user-table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Última conexión</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><a href="#" class="username">@octocat</a></td>
            <td>Propietario</td>
            <td><span class="status-badge status-active">Activo</span></td>
            <td>Hace 2 min</td>
          </tr>
          <tr>
            <td><a href="#" class="username">@dev_ux</a></td>
            <td>Mantenedor</td>
            <td><span class="status-badge status-active">Activo</span></td>
            <td>Ayer</td>
          </tr>
          <tr>
            <td><a href="#" class="username">@new_member</a></td>
            <td>Colaborador</td>
            <td><span class="status-badge status-pending">Pendiente</span></td>
            <td>-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="buttons">
      <a href="index.html" class="btn">Volver al inicio</a>
    </div>
  </div>

</body>
</html>
